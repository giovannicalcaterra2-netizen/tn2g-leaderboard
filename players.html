<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TN2G - Giocatori</title>

  <style>
    :root{
      --bg:#0b1f33;
      --bg2:#071423;
      --card:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.10);
      --muted:rgba(255,255,255,.72);
      --text:#fff;
      --gold:rgba(255,215,0,.18);
      --silver:rgba(192,192,192,.16);
      --bronze:rgba(205,127,50,.16);
      --chip:rgba(255,255,255,.08);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
    }

    .wrap{ max-width: 980px; margin: 0 auto; padding: 18px 14px 28px; }

    .header{
      display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
      padding: 8px 2px 14px;
      border-bottom:1px solid var(--line);
    }

    .title{
      font-weight:900;
      letter-spacing:.04em;
      text-transform:uppercase;
      font-size:26px;
      line-height:1;
    }
    .sub{ color:var(--muted); font-size:12px; margin-top:6px; }
    .updated{ color:rgba(255,255,255,.65); font-size:12px; text-align:right; }

    .panel{
      margin-top:14px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }

    .searchRow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .search{
      flex:1 1 260px;
      display:flex;
      align-items:center;
      gap:10px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      padding:10px 12px;
    }

    .search svg{ flex:0 0 auto; opacity:.9; }
    .search input{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:#fff;
      font-size:14px;
    }
    .search input::placeholder{ color:rgba(255,255,255,.60); }

    .chip{
      background:var(--chip);
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      color:rgba(255,255,255,.80);
      white-space:nowrap;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
      margin-left:auto;
    }

    .btn{
      cursor:pointer;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:#fff;
      padding:9px 12px;
      border-radius:12px;
      font-weight:800;
      font-size:12px;
      letter-spacing:.02em;
      text-transform:uppercase;
    }
    .btn:hover{ background:rgba(255,255,255,.12); }

    .list{
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:rgba(255,255,255,.04);
    }

    /* Header riga tabella */
    .thead{
      display:grid;
      grid-template-columns: 70px 1fr 90px;
      gap:12px;
      padding:12px 12px;
      background:rgba(0,0,0,.12);
      border-bottom:1px solid var(--line);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:rgba(255,255,255,.70);
      font-weight:900;
    }

    /* Riga giocatore */
    .row{
      display:grid;
      grid-template-columns: 70px 1fr 90px;
      gap:12px;
      align-items:center;
      padding:14px 12px;
      border-top:1px solid var(--line);
    }
    .row:first-of-type{ border-top:0; }

    .pos{
      font-weight:900;
      text-align:center;
      width:52px;
      height:42px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      margin-left:2px;
    }

    .nick{
      font-weight:900;
      font-size:15px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .meta{
      margin-top:4px;
      color:rgba(255,255,255,.65);
      font-size:12px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .badgeMini{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      font-weight:800;
      font-size:11px;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .points{
      text-align:right;
      font-weight:900;
      font-size:16px;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    .r1{ background: linear-gradient(90deg, var(--gold), transparent); }
    .r2{ background: linear-gradient(90deg, var(--silver), transparent); }
    .r3{ background: linear-gradient(90deg, var(--bronze), transparent); }

    .empty{
      padding:16px 12px;
      color:rgba(255,255,255,.75);
      font-size:13px;
    }

    .err{
      margin-top:12px;
      padding:10px 12px;
      border:1px solid rgba(255,255,255,.18);
      border-radius:12px;
      background:rgba(255,0,0,.12);
      white-space:pre-wrap;
      display:none;
    }

    /* Mobile: più compatto e leggibile in iframe */
    @media (max-width: 640px){
      .title{ font-size:22px; }
      .thead, .row{
        grid-template-columns: 56px 1fr 78px;
      }
      .pos{ width:46px; height:40px; }
      .points{ font-size:15px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <div>
        <div class="title">Giocatori TN2G</div>
        <div class="sub">Cerca il tuo nickname e controlla punti e posizione</div>
      </div>
      <div class="updated" id="updated">Caricamento…</div>
    </div>

    <div class="panel">
      <div class="searchRow">
        <div class="search" title="Cerca per nickname (anche parziale)">
          <!-- icona lente -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10.5 19a8.5 8.5 0 1 1 0-17 8.5 8.5 0 0 1 0 17Z" stroke="rgba(255,255,255,.85)" stroke-width="2"/>
            <path d="M16.8 16.8 22 22" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input id="q" type="text" placeholder="Scrivi il tuo nick… (es: ale)" autocomplete="off" />
        </div>

        <div class="actions">
          <span class="chip" id="count">0 giocatori</span>
          <button class="btn" id="clearBtn" type="button">Pulisci</button>
          <button class="btn" id="refreshBtn" type="button">Aggiorna</button>
        </div>
      </div>

      <div class="list" style="margin-top:14px;">
        <div class="thead">
          <div>Pos</div>
          <div>Nickname</div>
          <div style="text-align:right;">Punti</div>
        </div>
        <div id="list"></div>
        <div class="empty" id="empty" style="display:none;">Nessun risultato. Controlla di aver scritto il nickname giusto.</div>
      </div>

      <div class="err" id="err"></div>
    </div>
  </div>

<script>
  // ✅ Incolla qui il CSV “Pubblica sul web → CSV”
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdw2aqYrpebQDoKySNidi-hHRZJowezLt9u4XGIZVbUQzZQrIhOpy9G7qVtOOzyplfrJSjO5wRfp2_/pub?gid=1589947644&single=true&output=csv";

  let ALL = []; // {pos, nick, total, aper, out, nerd, call}

  function showErr(msg){
    const el = document.getElementById("err");
    el.style.display = "block";
    el.textContent = msg;
  }
  function hideErr(){
    const el = document.getElementById("err");
    el.style.display = "none";
    el.textContent = "";
  }

  function parseCSV(text){
    const rows = [];
    let row = [], cur = "", inQ = false;
    for (let i=0;i<text.length;i++){
      const c = text[i], n = text[i+1];
      if (c === '"') {
        if (inQ && n === '"'){ cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ){
        row.push(cur); cur="";
      } else if ((c === '\n' || c === '\r') && !inQ){
        if (cur.length || row.length){ row.push(cur); rows.push(row); }
        row=[]; cur="";
        if (c === '\r' && n === '\n') i++;
      } else {
        cur += c;
      }
    }
    if (cur.length || row.length){ row.push(cur); rows.push(row); }
    return rows;
  }

  function toInt(x){
    const n = parseInt(String(x||"").replace(/[^\d-]/g,""), 10);
    return Number.isFinite(n) ? n : 0;
  }

  function norm(s){
    return String(s||"")
      .trim()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, ""); // toglie accenti
  }

  function escapeHtml(s){
    return String(s||"").replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  function badgeLabel(p){
    // mini etichetta “TOP” per i primi 10
    if (p.pos === 1) return "LEADER";
    if (p.pos === 2) return "CHASER";
    if (p.pos === 3) return "CONTENDER";
    if (p.pos <= 10) return "TOP 10";
    return "";
  }

  function render(list){
    const root = document.getElementById("list");
    const empty = document.getElementById("empty");
    root.innerHTML = "";

    document.getElementById("count").textContent =
      `${list.length} / ${ALL.length} giocatori`;

    if (!list.length){
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";

    for (const p of list){
      const row = document.createElement("div");
      row.className = "row " + (p.pos===1?"r1":p.pos===2?"r2":p.pos===3?"r3":"");
      const lab = badgeLabel(p);

      row.innerHTML = `
        <div class="pos">${p.pos}</div>
        <div>
          <div class="nick">${escapeHtml(p.nick)} ${lab ? `<span class="badgeMini">${lab}</span>` : ""}</div>
          <div class="meta">
            <span>Aperitivi: <b>${p.aper}</b></span>
            <span>Outdoor: <b>${p.out}</b></span>
            <span>Nerd: <b>${p.nerd}</b></span>
            <span>Call: <b>${p.call}</b></span>
          </div>
        </div>
        <div class="points">${p.total}</div>
      `;
      root.appendChild(row);
    }
  }

  function applyFilter(){
    const q = norm(document.getElementById("q").value);
    if (!q) return render(ALL);

    const filtered = ALL.filter(p => norm(p.nick).includes(q));
    render(filtered);
  }

  async function load(){
    try{
      hideErr();

      const res = await fetch(CSV_URL, {cache:"no-store"});
      if (!res.ok) throw new Error("Impossibile scaricare il CSV. Controlla che il foglio sia pubblicato e che il link CSV sia corretto.");

      const text = await res.text();
      const data = parseCSV(text);
      if (data.length < 2) throw new Error("CSV vuoto o non valido.");

      const headers = data[0].map(h => String(h||"").trim().toUpperCase());
      const idx = (name) => headers.indexOf(name);

      const iNick = idx("NICK");
      const iAper = idx("APERITIVI");
      const iOut  = idx("OUTDOOR");
      const iNerd = idx("NERD");
      const iCall = idx("CALL");

      if ([iNick,iAper,iOut,iNerd,iCall].some(i => i < 0)){
        throw new Error(
          "Intestazioni mancanti nel CSV.\n" +
          "Nel tab TN2G_DB la riga 1 deve contenere: NICK, APERITIVI, OUTDOOR, NERD, CALL.\n" +
          "Intestazioni lette: " + headers.join(", ")
        );
      }

      const players = data.slice(1)
        .filter(r => (r[iNick]||"").trim() !== "")
        .map(r => {
          const nick = String(r[iNick]).trim();
          const aper = toInt(r[iAper]);
          const out  = toInt(r[iOut]);
          const nerd = toInt(r[iNerd]);
          const call = toInt(r[iCall]);
          const total = aper + out + nerd + call;
          return {nick, aper, out, nerd, call, total};
        })
        .sort((a,b) => b.total - a.total)
        .map((p, i) => ({...p, pos:i+1}));

      ALL = players;

      const now = new Date();
      document.getElementById("updated").textContent =
        "Aggiornato: " + now.toLocaleString("it-IT", {day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit"});

      applyFilter();

    }catch(e){
      showErr(e.message || String(e));
    }
  }

  // UI
  let t = null;
  document.getElementById("q").addEventListener("input", () => {
    clearTimeout(t);
    t = setTimeout(applyFilter, 80);
  });

  document.getElementById("clearBtn").addEventListener("click", () => {
    document.getElementById("q").value = "";
    applyFilter();
    document.getElementById("q").focus();
  });

  document.getElementById("refreshBtn").addEventListener("click", () => load());

  // Start
  load();
  setInterval(load, 60000); // refresh ogni 60s (se aggiorni il foglio)
</script>
</body>
</html>
