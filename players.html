<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TN2G - Giocatori</title>

<style>
:root{
--bg:#0b1f33;
--line:rgba(255,255,255,.10);
--card:rgba(255,255,255,.06);
--muted:rgba(255,255,255,.70);
--muted2:rgba(255,255,255,.55);
}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:linear-gradient(180deg,var(--bg),#071423);
color:#fff;
}

.wrap{max-width:980px;margin:0 auto;padding:18px 14px 28px;}

.header{
display:flex;
justify-content:space-between;
align-items:flex-end;
padding-bottom:14px;
border-bottom:1px solid var(--line);
}

.title{font-weight:800;font-size:28px;}
.sub{color:var(--muted);font-size:12px;margin-top:6px;}
.updated{color:var(--muted2);font-size:12px;}

.controls{
margin-top:14px;
display:flex;
gap:10px;
}

.search{
flex:1;
display:flex;
align-items:center;
gap:10px;
background:var(--card);
border:1px solid var(--line);
border-radius:14px;
padding:10px 12px;
}

.search input{
width:100%;
border:0;
outline:0;
background:transparent;
color:#fff;
}

.btn{
border:1px solid rgba(255,255,255,.18);
background:rgba(255,255,255,.06);
color:#fff;
border-radius:12px;
padding:10px 12px;
cursor:pointer;
}

.board{
margin-top:14px;
background:var(--card);
border:1px solid var(--line);
border-radius:16px;
overflow:hidden;
}

.row{
display:grid;
grid-template-columns:70px 1fr 110px;
gap:12px;
align-items:center;
padding:14px;
border-top:1px solid var(--line);
}

.pos{
width:46px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
border:1px solid var(--line);
background:rgba(255,255,255,.08);
font-weight:900;
}

.nick{font-weight:800;}
.tot{text-align:right;font-weight:900;}

.empty{padding:14px;color:var(--muted);}
.err{
margin-top:12px;
padding:10px;
border:1px solid rgba(255,255,255,.18);
border-radius:12px;
background:rgba(255,0,0,.12);
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
padding:18px;
z-index:9999;
}

.modal-box{
max-width:560px;
margin:80px auto;
background:#0b1f33;
border:1px solid rgba(255,255,255,.15);
border-radius:14px;
padding:16px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<div>
<div class="title">GIOCATORI TN2G</div>
<div class="sub">Cerca il tuo nick · clicca un giocatore per vedere achievement e badge</div>
</div>
<div id="updated">Caricamento…</div>
</div>

<div class="controls">
<div class="search">
🔎
<input id="q" placeholder="Cerca il tuo nick">
</div>
<button class="btn" id="clearBtn">Pulisci</button>
</div>

<div class="board" id="board"></div>
<div class="err" id="err" style="display:none"></div>

</div>


<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<div style="display:flex;justify-content:space-between;align-items:center">
<div>
<div id="mNick" style="font-weight:900;font-size:18px"></div>
<div id="mTot" style="opacity:.7;font-size:12px"></div>
</div>
<button class="btn" id="mClose">Chiudi</button>
</div>

<div id="mBody" style="margin-top:12px;display:grid;gap:8px"></div>

</div>
</div>


<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRdw2aqYrpebQDoKySNidi-hHRZJowezLt9u4XGIZVbUQzZQrIhOpy9G7qVtOOzyplfrJSjO5wRfp2_/pub?gid=1589947644&single=true&output=csv";
const CSV_DB_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRdw2aqYrpebQDoKySNidi-hHRZJowezLt9u4XGIZVbUQzZQrIhOpy9G7qVtOOzyplfrJSjO5wRfp2_/pub?gid=0&single=true&output=csv";

let DB=new Map();
let ALL=[];

const THRESHOLDS=[
{min:20,name:"Diamante"},
{min:10,name:"Oro"},
{min:5,name:"Argento"},
{min:3,name:"Bronzo"},
{min:1,name:"Cartone"}
];

function badgeName(v){
for(const t of THRESHOLDS) if(v>=t.min) return t.name;
return null;
}

function parseCSV(text){
return text.trim().split("\n").map(r=>r.split(","));
}

function toInt(x){return parseInt(x)||0;}

function render(list){

const board=document.getElementById("board");
board.innerHTML="";

if(!list.length){
board.innerHTML='<div class="empty">Nessun giocatore</div>';
return;
}

list.forEach(p=>{

const row=document.createElement("div");
row.className="row";

row.innerHTML=`
<div class="pos">${p.pos}</div>
<div class="nick">${p.nick}</div>
<div class="tot">${p.total}</div>
`;

row.style.cursor="pointer";
row.onclick=()=>openModal(p.nick,p.total);

board.appendChild(row);

});

}

function openModal(nick,total){

const modal=document.getElementById("modal");
const mNick=document.getElementById("mNick");
const mTot=document.getElementById("mTot");
const mBody=document.getElementById("mBody");

mNick.textContent=nick;
mTot.textContent=total+" punti totali";

const rec=DB.get(nick.toLowerCase());
mBody.innerHTML="";

if(rec){

[
["Aperitivi",badgeName(rec.aper)],
["Outdoor",badgeName(rec.out)],
["Nerd",badgeName(rec.nerd)],
["Call",badgeName(rec.call)],
["Speciale", rec.dalgiornozero >= 10 ? "Dal giorno zero" : null],
["Speciale", rec.stakanovista >= 10 ? "Stakanovista" : null]
].forEach(([cat,b])=>{
if(!b) return;

const d=document.createElement("div");
d.style.padding="10px 12px";
d.style.border="1px solid rgba(255,255,255,.12)";
d.style.borderRadius="12px";
d.style.background="rgba(255,255,255,.06)";
d.textContent=cat+" — "+b;
mBody.appendChild(d);
});

}

modal.style.display="block";

}

async function main(){

try{

const res=await fetch(CSV_URL);
const text=await res.text();
const data=parseCSV(text);

const players=data.slice(1).map(r=>({
nick:r[0],
total:toInt(r[1])
}))
.sort((a,b)=>b.total-a.total);

ALL=players.map((p,i)=>({...p,pos:i+1}));

const res2=await fetch(CSV_DB_URL);
const text2=await res2.text();
const data2=parseCSV(text2);

DB=new Map();

data2.slice(1).forEach(r=>{
DB.set(r[0].toLowerCase(),{
aper:toInt(r[1]),
out:toInt(r[2]),
nerd:toInt(r[3]),
call:toInt(r[4]),
dalgiornozero:toInt(r[5]),
stakanovista:toInt(r[6])
});
});

render(ALL);

document.getElementById("updated").textContent=
"Aggiornato: "+new Date().toLocaleString();

}catch(e){

document.getElementById("err").style.display="block";
document.getElementById("err").textContent=e;

}

}

document.getElementById("q").addEventListener("input",e=>{
const q=e.target.value.toLowerCase();
render(ALL.filter(p=>p.nick.toLowerCase().includes(q)));
});

document.getElementById("clearBtn").onclick=()=>{
document.getElementById("q").value="";
render(ALL);
};

document.getElementById("mClose").onclick=()=>{
document.getElementById("modal").style.display="none";
};

document.getElementById("modal").onclick=e=>{
if(e.target.id==="modal") e.target.style.display="none";
};

main();
setInterval(main,60000);

</script>

</body>
</html>
